# ── SERVER ──────────────────────────────────────
server.port=8080

# ── Credentials ─────────────────────────────────
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
# ── keys ───────────────────────
# Add your application keys here
anthropic.api.key=${ANTHROPIC_API_KEY}
# ── DATABASE: H2 IN-MEMORY ───────────────────────
# H2 is an in-memory database — perfect for development because
# it requires zero setup. Data is lost when the app restarts.
# To switch to PostgreSQL for production, comment all of this out
# and add the postgres driver to pom.xml + the connection string below.
spring.datasource.url=jdbc:h2:mem:listingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console — browse to http://localhost:8080/h2-console in dev
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JPA / HIBERNATE ─────────────────────────────
# create-drop: creates schema on startup, drops it on shutdown.
# Good for dev. Use "validate" or "none" in production.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# ── SEED DATA ───────────────────────────────────
# Spring Boot runs data.sql after Hibernate creates the schema.
spring.sql.init.mode=always

# ── LOGGING ─────────────────────────────────────
logging.level.com.jimrealty=DEBUG

# ── PRODUCTION POSTGRES TEMPLATE (commented out) ─
# Uncomment and fill in when deploying:
# spring.datasource.url=jdbc:postgresql://localhost:5432/listingdb
# spring.datasource.username=your_user
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate
