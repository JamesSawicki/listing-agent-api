# ── SERVER ──────────────────────────────────────
server.port=8080

# ── Credentials ─────────────────────────────────
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
# ── keys ───────────────────────
# Add your application keys here
anthropic.api.key=${ANTHROPIC_API_KEY}
# ── DATABASE: H2 IN-MEMORY ───────────────────────
# H2 is an in-memory database — perfect for development because
# it requires zero setup. Data is lost when the app restarts.
# To switch to PostgreSQL for production, comment all of this out
# and add the postgres driver to pom.xml + the connection string below.
spring.datasource.url=jdbc:h2:mem:listingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console — browse to http://localhost:8080/h2-console in dev
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JPA / HIBERNATE ─────────────────────────────
# create-drop: creates schema on startup, drops it on shutdown.
# Good for dev. Use "validate" or "none" in production.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# ── SEED DATA ───────────────────────────────────
# Spring Boot runs data.sql after Hibernate creates the schema.
spring.sql.init.mode=always

# ── LOGGING ─────────────────────────────────────
logging.level.com.jimrealty=DEBUG

# === Amenity scoring configuration ===

# Mapbox Isochrone API
mapbox.access-token=${MAPBOX_ACCESS_TOKEN:}
mapbox.isochrone.base-url=https://api.mapbox.com/isochrone/v1/mapbox

# Overpass API
overpass.base-url=https://overpass-api.de/api/interpreter
overpass.timeout-seconds=60

# Amenity scoring
amenity.scoring.enabled=true
amenity.scoring.bbox-buffer-meters=200
# Refresh only listings in these statuses to conserve Mapbox quota
amenity.scoring.refresh-statuses=Active,Pending,TNAS,Coming Soon
# Cron: monthly on the 1st at 03:00 UTC (= 21:00 or 22:00 CT depending on DST)
amenity.scoring.refresh-cron=0 0 3 1 * *

# MLS Grid
mls.grid.token=${MLS_GRID_TOKEN:}
mls.grid.base-url=${MLS_GRID_BASE_URL:https://api-demo.mlsgrid.com/v2}
mls.grid.originating-system=${MLS_GRID_ORIGINATING_SYSTEM:northstar}

# === Cloudflare Images (photo pipeline) ===
# Account ID: long hex from Cloudflare dashboard (same for all CF products).
# API token : created at My Profile → API Tokens with permission
#             "Account → Cloudflare Images → Edit", scoped to your account.
# If either is blank, CloudflareImagesClient logs a warning at startup and
# MediaIngestionService becomes a no-op (no uploads).
cloudflare.images.account-id=${CF_ACCOUNT_ID:}
cloudflare.images.api-token=${CF_IMAGES_API_TOKEN:}

